# yaml-language-server: $schema=../dist/schemas/mcp.schema.json

servers:
  context7:
    type: remote
    url: https://mcp.context7.com/mcp
    headers:
      CONTEXT7_API_KEY: ${CONTEXT7_API_KEY}
    localFallback:
      command: npx
      args:
        - -y
        - "@upstash/context7-mcp"
        - --api-key
        - ${CONTEXT7_API_KEY}
  gh_grep:
    type: remote
    url: https://mcp.grep.app
  memory:
    type: local
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-memory"
